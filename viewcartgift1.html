<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping cart — The Perfect Gift</title>
  <link rel="stylesheet" href="viewcartgift1.css">
  <script src="favicon-cart.js" defer></script>
  <script src="header-cart-nav.js" defer></script>
  <script src="giftresults-qty.js" defer></script>
  <script src="viewcartgift1.js" defer></script>
</head>
<body>

<div class="header">
  <h1><a class="header-title-link" href="index.html">The Perfect Gift</a></h1>
  <div class="header-cart" id="headerCart" role="img" title="You've added something to the cart" aria-label="You've added something to the cart">
    <img
      class="header-cart-img header-cart-img--default"
      id="headerCartDefault"
      src="imgs/cart.svg"
      alt=""
      width="45"
      height="50"
      hidden
    >
    <div
      class="header-cart-add1"
      id="headerCartAdd1"
      data-node-id="207:630"
      aria-hidden="false"
    >
      <img
        class="header-cart-add1-img"
        src="imgs/cart.svg"
        alt=""
        width="45"
        height="50"
      >
      <span class="header-cart-add1-badge">1</span>
    </div>
  </div>
</div>

<div class="content">
  <div class="grid-container"></div>
  <div class="viewcart-gift1-page" data-name="view-cart-gift1" data-node-id="210:877">
    <div class="viewcart-gift1-wrap">
      <div class="viewcart-gift1-badge" data-node-id="210:883">
        <p class="viewcart-gift1-badge-text" data-node-id="210:886">Shopping Cart</p>
      </div>

      <div class="viewcart-gift1-cart" data-name="cart-items" data-node-id="210:887">
        <div class="viewcart-gift1-price-row" data-name="price-line" data-node-id="210:888">
          <p class="viewcart-gift1-price-label" data-node-id="210:889">Price</p>
          <div class="viewcart-gift1-rule" aria-hidden="true"></div>
        </div>

        <div class="viewcart-gift1-inner-wrap">
          <div class="viewcart-gift1-inner" data-name="cart-gift1-desc" data-node-id="210:897">
            <p class="viewcart-gift1-title" data-node-id="210:898">The &ldquo;Mother&rsquo;s Guilt&rdquo; Scented Candle</p>
            <div class="viewcart-gift1-price-block" data-name="gift-desc_text" data-node-id="210:899">
              <p class="viewcart-gift1-price-line">
                <span class="viewcart-gift1-discount">-48%</span>
                <span class="viewcart-gift1-price-main"> $16.99 (pack of 1)</span>
              </p>
            </div>
            <div class="viewcart-gift1-qty-row">
              <div class="viewcart-gift1-qty" data-name="quantity" data-node-id="210:902" role="group" aria-label="Quantity">
                <button type="button" class="viewcart-gift1-qty-btn" aria-label="Decrease quantity">&minus;</button>
                <span class="viewcart-gift1-qty-num" aria-live="polite">1</span>
                <button type="button" class="viewcart-gift1-qty-btn" aria-label="Increase quantity">+</button>
              </div>
            </div>
          </div>
        </div>

        <div class="viewcart-gift1-total-line" data-name="total-line" data-node-id="210:892">
          <div class="viewcart-gift1-rule viewcart-gift1-rule--bottom" aria-hidden="true"></div>
          <p class="viewcart-gift1-subtotal" data-node-id="210:894">
            Subtotal (1 item): $16.99
          </p>
        </div>
      </div>

      <div class="viewcart-gift1-actions" data-name="actions" data-node-id="210:909">
        <a class="viewcart-gift1-back" href="form.html" data-name="back-to-quiz" data-node-id="210:895">Back to quiz</a>
        <a class="viewcart-gift1-checkout" href="ratingform.html" data-name="proceed-checkout" data-node-id="210:907">Proceed to checkout</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
