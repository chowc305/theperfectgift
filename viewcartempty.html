<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping cart — The Perfect Gift</title>
  <link rel="stylesheet" href="viewcartempty.css">
  <script src="favicon-cart.js" defer></script>
  <script src="header-cart-nav.js" defer></script>
</head>
<body>

<div class="header">
  <h1><a class="header-title-link" href="index.html">The Perfect Gift</a></h1>
  <div class="header-cart" id="headerCart" role="img" title="empty" aria-label="empty">
    <img
      class="header-cart-img header-cart-img--default"
      id="headerCartDefault"
      src="imgs/cart.svg"
      alt=""
      width="45"
      height="50"
    >
    <div
      class="header-cart-add1"
      id="headerCartAdd1"
      data-node-id="207:630"
      hidden
      aria-hidden="true"
    >
      <img
        class="header-cart-add1-img"
        src="imgs/cart.svg"
        alt=""
        width="45"
        height="50"
      >
      <span class="header-cart-add1-badge">1</span>
    </div>
  </div>
</div>

<div class="content">
  <div class="grid-container"></div>
  <div class="viewcart-empty-page" data-name="view-cart-empty" data-node-id="208:752">
    <div class="viewcart-empty-wrap">
      <div class="viewcart-empty-badge" data-node-id="208:762">
        <p class="viewcart-empty-badge-text" data-node-id="208:765">Shopping Cart</p>
      </div>

      <div class="viewcart-empty-cart" data-name="cart-items" data-node-id="208:767">
        <div class="viewcart-empty-price-row" data-name="price-line" data-node-id="208:782">
          <p class="viewcart-empty-price-label" data-node-id="208:792">Price</p>
          <div class="viewcart-empty-rule" aria-hidden="true"></div>
        </div>

        <p class="viewcart-empty-hint" data-node-id="208:794">Fill up the cart</p>

        <div class="viewcart-empty-total-line" data-name="total-line" data-node-id="208:797">
          <div class="viewcart-empty-rule viewcart-empty-rule--bottom" aria-hidden="true"></div>
          <p class="viewcart-empty-subtotal" data-node-id="208:795">Subtotal (0 items): $0.00</p>
        </div>
      </div>

      <a class="viewcart-empty-back" href="form.html" data-name="back-to-quiz" data-node-id="208:798">Back to quiz</a>
    </div>
  </div>
</div>

</body>
</html>
