<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping cart — The Perfect Gift</title>
  <link rel="stylesheet" href="viewcartplus.css">
  <script src="favicon-cart.js" defer></script>
  <script src="header-cart-nav.js" defer></script>
  <script src="giftresults-qty.js" defer></script>
  <script src="viewcartplus.js" defer></script>
</head>
<body>

<div class="header">
  <h1><a class="header-title-link" href="index.html">The Perfect Gift</a></h1>
  <div class="header-cart" id="headerCart" role="img" title="You've added something to the cart" aria-label="You've added something to the cart">
    <img
      class="header-cart-img header-cart-img--default"
      id="headerCartDefault"
      src="imgs/cart.svg"
      alt=""
      width="45"
      height="50"
      hidden
    >
    <div
      class="header-cart-add1"
      id="headerCartAdd1"
      data-node-id="207:630"
      aria-hidden="false"
    >
      <img
        class="header-cart-add1-img"
        src="imgs/cart.svg"
        alt=""
        width="45"
        height="50"
      >
      <span class="header-cart-add1-badge">1</span>
    </div>
  </div>
</div>

<div class="content">
  <div class="grid-container"></div>
  <div class="viewcart-plus-page" data-name="view-cart-extra" data-node-id="212:990">
    <div class="viewcart-plus-wrap">
      <div class="viewcart-plus-badge" data-node-id="212:996">
        <p class="viewcart-plus-badge-text" data-node-id="212:999">Shopping Cart</p>
      </div>

      <div class="viewcart-plus-cart" data-name="cart-items" data-node-id="212:1000">
        <div class="viewcart-plus-price-row" data-name="price-line" data-node-id="212:1001">
          <p class="viewcart-plus-price-label" data-node-id="212:1002">Price</p>
          <div class="viewcart-plus-rule" aria-hidden="true"></div>
        </div>

        <div class="viewcart-plus-packaging" data-name="extra-cost" data-node-id="212:1024">
          <p class="viewcart-plus-packaging-title" data-node-id="212:1025">Fancy Packaging</p>
          <p class="viewcart-plus-packaging-price" data-node-id="212:1027">$4.99</p>
        </div>

        <div class="viewcart-plus-item" data-name="cart-gift1-desc" data-node-id="216:1029">
          <p class="viewcart-plus-item-title" data-node-id="216:1030">The &ldquo;Mother&rsquo;s Guilt&rdquo; Scented Candle</p>
          <div class="viewcart-plus-item-price-block" data-name="gift-desc_text" data-node-id="216:1031">
            <p class="viewcart-plus-price-line">
              <span class="viewcart-plus-discount">-48%</span>
              <span class="viewcart-plus-price-main"> $16.99 (pack of 1)</span>
            </p>
          </div>
          <div class="viewcart-plus-qty-row">
            <div class="viewcart-plus-qty" data-name="quantity" data-node-id="216:1034" role="group" aria-label="Quantity">
              <button type="button" class="viewcart-plus-qty-btn" aria-label="Decrease quantity">&minus;</button>
              <span class="viewcart-plus-qty-num" aria-live="polite">1</span>
              <button type="button" class="viewcart-plus-qty-btn" aria-label="Increase quantity">+</button>
            </div>
          </div>
        </div>

        <div class="viewcart-plus-total-line" data-name="total-line" data-node-id="212:1005">
          <div class="viewcart-plus-rule viewcart-plus-rule--bottom" aria-hidden="true"></div>
          <p class="viewcart-plus-subtotal" data-node-id="212:1007">
            Subtotal (1 item): $16.99 + $4.99= $20.99
          </p>
        </div>
      </div>

      <div class="viewcart-plus-actions" data-name="actions" data-node-id="216:1039">
        <a class="viewcart-plus-back" href="form.html" data-name="back-to-quiz" data-node-id="216:1040">Back to quiz</a>
        <a class="viewcart-plus-checkout" href="ratingform.html" data-name="proceed-checkout" data-node-id="216:1041">Proceed to checkout</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
