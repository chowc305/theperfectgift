<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping cart — The Perfect Gift</title>
  <link rel="stylesheet" href="viewcartextra.css">
  <script src="favicon-cart.js" defer></script>
  <script src="header-cart-nav.js" defer></script>
</head>
<body data-cart-page="extra">

<div class="header">
  <h1><a class="header-title-link" href="index.html">The Perfect Gift</a></h1>
  <div class="header-cart" id="headerCart" role="img" title="You've added something to the cart" aria-label="You've added something to the cart">
    <img
      class="header-cart-img header-cart-img--default"
      id="headerCartDefault"
      src="imgs/cart.svg"
      alt=""
      width="45"
      height="50"
      hidden
    >
    <div
      class="header-cart-add1"
      id="headerCartAdd1"
      data-node-id="207:630"
      aria-hidden="false"
    >
      <img
        class="header-cart-add1-img"
        src="imgs/cart.svg"
        alt=""
        width="45"
        height="50"
      >
      <span class="header-cart-add1-badge">1</span>
    </div>
  </div>
</div>

<div class="content">
  <div class="grid-container"></div>
  <div class="viewcart-extra-page" data-name="view-cart-extra" data-node-id="231:1114">
    <div class="viewcart-extra-wrap">
      <div class="viewcart-extra-badge" data-node-id="231:1120">
        <p class="viewcart-extra-badge-text" data-node-id="231:1123">Shopping Cart</p>
      </div>

      <div class="viewcart-extra-cart" data-name="cart-items" data-node-id="231:1124">
        <div class="viewcart-extra-price-row" data-name="price-line" data-node-id="231:1125">
          <p class="viewcart-extra-price-label" data-node-id="231:1126">Price</p>
          <div class="viewcart-extra-rule" aria-hidden="true"></div>
        </div>

        <div class="viewcart-extra-extra" data-name="extra-cost" data-node-id="231:1128">
          <p class="viewcart-extra-extra-title" data-node-id="231:1129">Fancy Packaging</p>
          <p class="viewcart-extra-extra-price" data-node-id="231:1131">$4.99</p>
        </div>

        <div class="viewcart-extra-total-line" data-name="total-line" data-node-id="231:1141">
          <div class="viewcart-extra-rule viewcart-extra-rule--bottom" aria-hidden="true"></div>
          <p class="viewcart-extra-subtotal" data-node-id="231:1143">
            Subtotal (0 item): $0.00 + $4.99
          </p>
        </div>
      </div>

      <div class="viewcart-extra-actions" data-name="actions" data-node-id="231:1144">
        <a class="viewcart-extra-back" href="form.html" data-name="back-to-quiz" data-node-id="231:1145">Back to quiz</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
