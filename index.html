<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Perfect Gift</title>
    <link rel="icon" type="image/png" href="imgs/box.png">
    <script src="favicon-cart.js"></script>
    <script src="loading-gate.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <script src="header-cart-nav.js" defer></script>
</head>
<body>

<div class="header">
<h1><a class="header-title-link" href="index.html">The Perfect Gift</a></h1>
  <div class="header-cart" id="headerCart" role="img" title="empty" aria-label="empty">
    <img
      class="header-cart-img header-cart-img--default"
      id="headerCartDefault"
      src="imgs/cart.svg"
      alt=""
      width="45"
      height="50"
    >
    <div
      class="header-cart-add1"
      id="headerCartAdd1"
      hidden
      aria-hidden="true"
    >
      <img
        class="header-cart-add1-img"
        src="imgs/cart.svg"
        alt=""
        width="45"
        height="50"
      >
      <span class="header-cart-add1-badge">1</span>
    </div>
  </div>
</div>

<div class="content">
<div class="grid-container"></div>

<div class="laptop-wrap">
  <div class="laptop" data-node-id="166:80">
    <div class="laptop-shift">
    <div class="laptop-screen">
      <div class="laptop-screen-inner">
        <div class="laptop-cell laptop-cell--perfume">
          <img src="imgs/laptop-perfume.png" alt="">
        </div>
        <div class="laptop-cell laptop-cell--camera">
          <img src="imgs/laptop-camera.png" alt="">
        </div>
        <div class="laptop-cell laptop-cell--keychain">
          <div class="laptop-cell-keychain-inner">
            <img src="imgs/laptop-keychain.png" alt="">
          </div>
        </div>
        <div class="laptop-cell laptop-cell--airpods">
          <img src="imgs/laptop-airpods.png" alt="">
        </div>
        <div class="laptop-cell laptop-cell--flowers">
          <img src="imgs/laptop-flowers.png" alt="">
        </div>
        <div class="laptop-cell laptop-cell--watch">
          <div class="laptop-cell-watch-inner">
            <img src="imgs/laptop-watch.png" alt="">
          </div>
        </div>
        <div class="laptop-cell laptop-cell--tickets">
          <div class="laptop-cell-tickets-inner">
            <img src="imgs/laptop-tickets.png" alt="">
          </div>
        </div>
        <div class="laptop-cell laptop-cell--mug">
          <img src="imgs/laptop-mug.png" alt="">
        </div>
        <div class="laptop-cell laptop-cell--pen">
          <img src="imgs/laptop-pen.png" alt="">
        </div>
        <div class="laptop-cell laptop-cell--ipad">
          <img src="imgs/laptop-ipad.png" alt="">
        </div>
        <div class="laptop-cell laptop-cell--giftcard">
          <img src="imgs/laptop-giftcard.png" alt="">
        </div>
        <div class="laptop-cell laptop-cell--incense">
          <img src="imgs/laptop-incense.png" alt="">
        </div>
        <div class="laptop-screen-complete" id="laptopScreenComplete" hidden aria-hidden="true">
          <div class="laptop-screen-complete-card" role="status">
            <p class="laptop-screen-complete-copy">
              <span class="laptop-screen-complete-line">The Perfect Gift</span>
              <span class="laptop-screen-complete-line">is the right place for you!</span>
            </p>
          </div>
          <button type="button" class="laptop-screen-complete-next" id="laptopScreenCompleteNext" aria-label="Go to next step">
            Next
          </button>
        </div>
      </div>
    </div>
    <div class="laptop-keyboard">
      <img src="imgs/laptop-keyboard.svg" alt="" width="841" height="236">
      <div class="laptop-keyboard-keys" aria-hidden="true">
        <div class="laptop-kb-row laptop-kb-row--fn">
          <span class="laptop-kb-key laptop-kb-key--fn"></span>
          <span class="laptop-kb-key laptop-kb-key--fn"></span>
          <span class="laptop-kb-key laptop-kb-key--fn"></span>
          <span class="laptop-kb-key laptop-kb-key--fn"></span>
          <span class="laptop-kb-key laptop-kb-key--fn"></span>
          <span class="laptop-kb-key laptop-kb-key--fn"></span>
        </div>
        <div class="laptop-kb-row">
          <span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span>
        </div>
        <div class="laptop-kb-row">
          <span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span>
        </div>
        <div class="laptop-kb-row">
          <span class="laptop-kb-key laptop-kb-key--tab"></span>
          <span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span>
          <span class="laptop-kb-key laptop-kb-key--enter"></span>
        </div>
        <div class="laptop-kb-row">
          <span class="laptop-kb-key laptop-kb-key--shift"></span>
          <span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span>
          <span class="laptop-kb-key laptop-kb-key--shift"></span>
        </div>
        <div class="laptop-kb-row laptop-kb-row--space">
          <span class="laptop-kb-key"></span><span class="laptop-kb-key"></span>
          <span class="laptop-kb-key laptop-kb-key--medium"></span>
          <span class="laptop-kb-key laptop-kb-key--space"></span>
          <span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span><span class="laptop-kb-key"></span>
        </div>
        <div class="laptop-kb-trackpad"></div>
      </div>
    </div>
    </div>
    <aside class="laptop-bubble" aria-label="Introduction">
      <p class="laptop-bubble-text">Have you been searching all over for the right gift for the right occasion for that special person?</p>
    </aside>
  </div>
</div>

</div>
  </body>
  </html>
